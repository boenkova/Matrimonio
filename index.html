
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maxim & Angelika</title>
<style>
body{
 font-family: serif;
 background:#f7f6f1;
 color:#2f3e2f;
 text-align:center;
 padding:40px 20px;
}
h1{font-size:40px;margin-bottom:10px;}
p{max-width:500px;margin:10px auto;}
.box{
 background:white;
 border-radius:20px;
 padding:20px;
 margin:20px auto;
 max-width:500px;
 box-shadow:0 10px 30px rgba(0,0,0,0.05);
}
select, input, textarea{
 width:100%;
 padding:12px;
 border-radius:10px;
 border:1px solid #ccc;
 margin-top:10px;
}
button{
 margin-top:20px;
 padding:15px;
 width:100%;
 border:none;
 border-radius:20px;
 background:#5a6d5a;
 color:white;
 font-size:16px;
}
.lang{
 position:fixed;
 top:10px;
 right:10px;
}
</style>
</head>

<body>

<div class="lang">
<button onclick="setLang('it')">IT</button>
<button onclick="setLang('ro')">RO</button>
<button onclick="setLang('ua')">UA</button>
</div>

<h1>Maxim & Angelika</h1>

<div class="box">
<p id="text1"></p>
</div>

<div class="box">
<h3 id="rsvpTitle"></h3>

<input id="name" placeholder="">
<select id="presence">
<option value=""></option>
<option value="yes"></option>
<option value="no"></option>
</select>

<textarea id="msg"></textarea>

<button onclick="send()"
 id="btn"></button>
</div>

<script>

const t = {
it:{
text1:"Siamo felici di condividere con voi questo giorno speciale.",
rsvp:"Conferma presenza",
name:"Nome e cognome",
yes:"Parteciperò",
no:"Non potrò venire",
msg:"Messaggio",
btn:"Invia su WhatsApp"
},
ro:{
text1:"Suntem fericiți să împărtășim această zi specială cu voi.",
rsvp:"Confirmă prezența",
name:"Nume și prenume",
yes:"Voi participa",
no:"Nu pot veni",
msg:"Mesaj",
btn:"Trimite pe WhatsApp"
},
ua:{
text1:"Ми раді розділити з вами цей особливий день.",
rsvp:"Підтвердіть присутність",
name:"Ім’я та прізвище",
yes:"Буду присутній",
no:"Не зможу бути",
msg:"Повідомлення",
btn:"Надіслати у WhatsApp"
}
}

function setLang(l){
document.getElementById("text1").innerText=t[l].text1;
document.getElementById("rsvpTitle").innerText=t[l].rsvp;
document.getElementById("name").placeholder=t[l].name;
document.getElementById("presence").options[1].text=t[l].yes;
document.getElementById("presence").options[2].text=t[l].no;
document.getElementById("msg").placeholder=t[l].msg;
document.getElementById("btn").innerText=t[l].btn;
}

setLang('it');

function send(){
let n=document.getElementById("name").value;
let p=document.getElementById("presence").value;
let m=document.getElementById("msg").value;

let text=encodeURIComponent("Nome: "+n+"\nPresenza: "+p+"\nMessaggio: "+m);
window.open("https://wa.me/393471946304?text="+text);
}

</script>

</body>
</html>
